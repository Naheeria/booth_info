<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b2d9e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 책 표지 왼쪽 -->
  <rect x="20" y="25" width="30" height="50" rx="2" fill="#5b2d9e" opacity="0.8"/>
  <!-- 책 표지 오른쪽 -->
  <rect x="50" y="25" width="30" height="50" rx="2" fill="url(#bookGradient)"/>
  <!-- 책 등 -->
  <rect x="48" y="25" width="4" height="50" fill="#3d1e5c"/>
  <!-- 책 위 장식선 -->
  <line x1="20" y1="35" x2="80" y2="35" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <!-- 책 중간 장식선 -->
  <line x1="20" y1="50" x2="80" y2="50" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
</svg>